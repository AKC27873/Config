##### KEYBINDS / BEHAVIOR #####

# Change prefix from C-b to C-x
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Split panes
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
##### COPY / PASTE SETTINGS #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.tmux/resurrect'
setw -g mode-keys vi
unbind ]
bind P paste-buffer
bind [ copy-mode


# Vi copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi Y send-keys -X copy-end-of-li

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D


##### BEHAVIOR #####
set-option -g allow-rename off
set-option -g automatic-rename off
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g status-position top
set -g renumber-windows on

##### AYU DARK THEME #####
set -g status-style "bg=#0d1017,fg=#bfbdb6"

# Left: session name
set -g status-left "#[bg=#e6b450,fg=#0d1017,bold] #S #[bg=#0d1017,fg=#e6b450] "
set -g status-left-length 30

# Right: time + date
set -g status-right "#[fg=#bfbdb6] #H #[fg=#6c7380]│#[fg=#39bae6] %H:%M #[fg=#6c7380]│#[fg=#bfbdb6] %Y-%m-%d "
set -g status-right-length 40

# Windows
set -g window-status-format "#[fg=#6c7380] #I #W "
set -g window-status-current-format "#[bg=#131721,fg=#e6b450,bold] #I #W #[bg=#0d1017,fg=#131721]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#1c2133"
set -g pane-active-border-style "fg=#e6b450"

# Messages / command prompt
set -g message-style "bg=#131721,fg=#e6b450"
set -g message-command-style "bg=#131721,fg=#39bae6"

# Copy mode highlight
set -g mode-style "bg=default,fg=#e6b450"

# Initialize TPM (keep at bottom)
run -b '~/.tmux/plugins/tpm/tpm'
bind-key C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
bind-key C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh
