##### PREFIX & KEYBINDINGS #####

# Change prefix from C-b to C-x
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Split panes (keep current path)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Pane navigation with Alt + hjkl
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

##### COPY / PASTE SETTINGS #####

# Vi style copy mode
setw -g mode-keys vi
unbind ]
bind [ copy-mode

# Vi copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi Y send-keys -X copy-end-of-line

bind P paste-buffer

##### PLUGINS & CATPPUCCIN #####

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.tmux/resurrect'

# gruvbox for tmux
run ~/.config/tmux/plugins/tmux-gruvbox/gruvbox-tpm.tmux

set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'
# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

##### BEHAVIOR & UI #####

# General options
set-option -g allow-rename off
set-option -g automatic-rename off
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g status-position top
set -g renumber-windows on
set-window-option -g status-position top

#### STATUS BAR ####
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-left-status-a '#S' # tmux's session name
# set date in US notation
set -g @tmux-gruvbox-right-status-x '%m/%d/%Y' # e.g.: 01/31/2024
# display hostname and enhance section with other plugin
set -g @tmux-gruvbox-right-status-z '#h #{tmux_mode_indicator}'




# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
bind-key C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh
bind-key C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
