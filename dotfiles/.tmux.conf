##### PREFIX & KEYBINDINGS #####

# Change prefix from C-b to C-x
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Split panes (keep current path)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Pane navigation with Alt + hjkl
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

##### COPY / PASTE SETTINGS #####

# Vi style copy mode
setw -g mode-keys vi
unbind ]
bind [ copy-mode

# Vi copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi Y send-keys -X copy-end-of-line

bind P paste-buffer

##### PLUGINS & CATPPUCCIN #####

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.tmux/resurrect'

##### BEHAVIOR & UI #####

# General options
set-option -g allow-rename off
set-option -g automatic-rename off
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g status-position top
set -g renumber-windows on
set-window-option -g status-position top

# pane borders

set -g pane-border-style        "fg=#3e4451"
set -g pane-active-border-style  "fg=#61afef"
# status bar
set -g status-style            "bg=#21252b,fg=#abb2bf"
set -g status-interval          5
set -g status-left-length       50
set -g status-right-length      80
set -g status-left  "#[bg=#61afef,fg=#21252b,bold] #{session_name} #[bg=#2c313c,fg=#abb2bf,nobold]"
set -g status-right "#[bg=#2c313c,fg=#e5c07b] %a %d %b %Y #[bg=#2c313c,fg=#98c379,bold] %H:%M #[bg=#2c313c,fg=#c678dd] #h "
# window tabs
set -g window-status-style          "bg=#21252b,fg=#5c6370"
set -g window-status-current-style   "bg=#2c313c,fg=#abb2bf"
set -g window-status-format          " #[fg=#5c6370]#I#[fg=#5c6370] #W "
set -g window-status-current-format   " #[fg=#61afef]#I#[fg=#abb2bf] #W #[fg=#61afef]─ "
set -g window-status-separator        ""
# message / command bar
set -g message-style     "bg=#2c313c,fg=#e5c07b"
set -g message-command-style "bg=#2c313c,fg=#61afef"
# selection in copy mode
set -g mode-style "bg=#3e4451,fg=default"



# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
bind-key C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh
bind-key C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
